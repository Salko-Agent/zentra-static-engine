<div class="container mt-40">
    <!-- Market Hero -->
    <div class="card mb-40 text-center"
        style="padding: 60px; background: radial-gradient(circle at center, rgba(255, 174, 0, 0.1), rgba(19, 19, 22, 0.9)); border: 1px solid var(--accent-amber);">
        <span class="badge amber mb-20">ZENTRA PROTECT ACTIVE</span>
        <h1 class="gradient-text mb-20">THE HANGAR</h1>
        <p class="text-muted mb-40" style="max-width: 600px; margin: 0 auto;">
            The verified marketplace for pre-owned precision gear. Buy and sell with confidence using our secure escrow
            service.
        </p>
        <div class="flex-center" style="gap: 20px;">
            <a href="/hangar/create" class="btn btn-primary" style="background: var(--accent-amber); color: #000;">+
                SELL ITEM</a>
            <div class="flex bg-panel" style="padding: 5px; border: 1px solid var(--border-glass); border-radius: 4px;">
                <input type="text" placeholder="Search Hangar..."
                    style="background: transparent; border: none; color: #fff; padding: 0 15px; outline: none;">
                <button class="btn btn-secondary small">SEARCH</button>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="flex-between mb-40">
        <div class="flex" style="gap: 15px;" id="hangar-filters">
            <button class="btn btn-secondary small active" onclick="applyFilter('all', this)">ALL</button>
            <button class="btn btn-secondary small" onclick="applyFilter('model-kits', this)">MODEL KITS</button>
            <button class="btn btn-secondary small" onclick="applyFilter('hardware', this)">HARDWARE</button>
            <button class="btn btn-secondary small" onclick="applyFilter('maker-gear', this)">MAKER TOOLS</button>
        </div>
        <div class="text-muted text-sm">Sorted by: <span class="text-cyan">NEWEST</span></div>
    </div>

    <!-- Listings Grid (Dynamic) -->
    <div id="hangar-listings" class="grid"
        style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        <!-- Loaded via JS -->
    </div>
</div>

<script type="module">
    import { Market } from '/assets/js/market.js';
    import { Auth } from '/assets/js/auth.js';

    // Init Logic
    Auth.init();

    // Global filter handler
    window.applyFilter = function (category, btn) {
        // UI
        document.querySelectorAll('#hangar-filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Load
        loadListings(category);
    };

    async function loadListings(category = 'all') {
        const container = document.getElementById('hangar-listings');
        // Skeleton
        container.innerHTML = `
            <div class="skeleton-card" style="height: 380px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass);"></div>
            <div class="skeleton-card" style="height: 380px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass);"></div>
            <div class="skeleton-card" style="height: 380px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass);"></div>
        `;

        try {
            const listings = await Market.getListings(category);

            if (listings.length === 0) {
                container.innerHTML = `
                    <div class="text-center p-40" style="grid-column:1/-1;">
                        <h3 class="text-muted mb-20">Sector Empty</h3>
                        <p class="mb-20">No active listings in this category.</p>
                        <a href="/hangar/create.html" class="btn btn-primary small">BE THE FIRST TO SELL</a>
                    </div>`;
                return;
            }

            container.innerHTML = listings.map(item => `
                <div class="card flex-col hover-scale">
                    <div class="card-image" style="height: 200px; background: #111; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <img src="${item.images ? item.images[0] : '/assets/images/placeholder.png'}" style="width: 100%; height: 100%; object-fit: cover;">
                        <span class="badge amber" style="position: absolute; top: 10px; right: 10px;">${item.price} €</span>
                    </div>
                    <div style="padding: 20px; flex: 1; display: flex; flex-direction: column;">
                        <div class="flex-between mb-10">
                            <span class="text-xs text-muted font-mono">${(item.category || 'misc').toUpperCase()}</span>
                            <span class="text-xs text-cyan opacity-80">${(item.condition || 'used').toUpperCase()}</span>
                        </div>
                        <h3 class="mb-10 text-white" style="font-size: 1.1rem; line-height: 1.3;">${item.title}</h3>
                        <a href="/hangar/listing.html?id=${item.id}" class="btn btn-secondary full-width text-sm mt-auto" style="text-decoration: none; display: block; text-align: center;">VIEW INTEL</a>
                    </div>
                </div>
            `).join('');

        } catch (err) {
            console.error(err);
            container.innerHTML = '<div class="text-center text-amber">Error loading market data.</div>';
        }
    }

    loadListings();
</script>
