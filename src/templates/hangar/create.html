<div class="container mt-40">
    <div class="card p-40" style="max-width: 800px; margin: 0 auto;">
        <h1 class="gradient-text mb-20">LIST A NEW ITEM</h1>
        <p class="text-muted mb-40">Turn your gear into credits. Verified P2P Exchange.</p>

        <form id="create-listing-form" class="flex-col" style="gap: 20px;">

            <!-- Basic Info -->
            <div class="form-group">
                <label class="text-sm text-secondary mb-10 block">ITEM TITLE</label>
                <input type="text" id="title" class="input-glass full-width"
                    placeholder="e.g. Tamiya F-14 Tomcat (Unopened)" maxlength="80" required>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label class="text-sm text-secondary mb-10 block">PRICE (EUR)</label>
                    <input type="number" id="price" class="input-glass full-width" placeholder="0.00" min="1"
                        step="0.01" required>
                </div>
                <div class="form-group">
                    <label class="text-sm text-secondary mb-10 block">CATEGORY</label>
                    <select id="category" class="input-glass full-width" required>
                        <option value="" disabled selected>Select Sector...</option>
                        <option value="model-kits">Model Kits</option>
                        <option value="hardware">Hardware Components</option>
                        <option value="tech">Tech / Drones</option>
                        <option value="maker-gear">Maker Tools</option>
                    </select>
                </div>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label class="text-sm text-secondary mb-10 block">CONDITION</label>
                    <select id="condition" class="input-glass full-width" required>
                        <option value="" disabled selected>Select Condition...</option>
                        <option value="new">New (Sealed)</option>
                        <option value="mint">Mint (Opened, Unused)</option>
                        <option value="excellent">Excellent (Used)</option>
                        <option value="good">Good (Visible Wear)</option>
                        <option value="project">Project (Needs Repair)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="text-sm text-secondary mb-10 block">LOCATION</label>
                    <input type="text" id="location" class="input-glass full-width" placeholder="City, Country"
                        required>
                </div>
            </div>

            <div class="form-group">
                <label class="text-sm text-secondary mb-10 block">DESCRIPTION</label>
                <textarea id="description" class="input-glass full-width" rows="5"
                    placeholder="Describe the item condition, history, and any included accessories..." maxlength="2000"
                    required></textarea>
            </div>

            <!-- Image Upload Placeholder -->
            <div class="form-group">
                <label class="text-sm text-secondary mb-10 block">IMAGES (URL for Prototype)</label>
                <input type="text" id="image-url" class="input-glass full-width"
                    placeholder="https://example.com/image.jpg">
                <p class="text-xs text-muted mt-5">*For this beta, please provide a direct image link.</p>
            </div>

            <!-- Actions -->
            <div class="flex-center mt-20" style="gap: 20px;">
                <a href="/hangar/index.html" class="btn btn-secondary">CANCEL</a>
                <button type="submit" class="btn btn-primary" id="submit-btn" style="min-width: 200px;">PUBLISH
                    LISTING</button>
            </div>

            <div id="form-error" class="text-amber text-center hidden mt-10"></div>

        </form>
    </div>
</div>

<style>
    .input-glass {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-glass);
        color: white;
        padding: 12px;
        border-radius: 4px;
        font-family: 'Inter', sans-serif;
    }

    .input-glass:focus {
        outline: none;
        border-color: var(--accent-cyan);
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
    }

    label {
        letter-spacing: 1px;
        font-weight: 600;
    }
</style>

<script type="module">
    import { Market } from '/src/js/market.js';
    import { Auth } from '/src/js/auth.js';

    Auth.init();

    const form = document.getElementById('create-listing-form');
    const errorDiv = document.getElementById('form-error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!Auth.currentUser) {
            alert("Please login to create a listing.");
            Auth.login();
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'PUBLISHING...';
        errorDiv.classList.add('hidden');

        const listingData = {
            title: document.getElementById('title').value,
            price: parseFloat(document.getElementById('price').value),
            category: document.getElementById('category').value,
            condition: document.getElementById('condition').value,
            location: document.getElementById('location').value,
            description: document.getElementById('description').value,
            images: [document.getElementById('image-url').value || 'https://via.placeholder.com/400'], // Default if empty
            currency: 'EUR'
        };

        try {
            await Market.createListing(listingData);
            window.location.href = '/hangar/index.html';
        } catch (err) {
            console.error(err);
            errorDiv.textContent = err.message;
            errorDiv.classList.remove('hidden');
            submitBtn.disabled = false;
            submitBtn.textContent = 'PUBLISH LISTING';
        }
    });
</script>
